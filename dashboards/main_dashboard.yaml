title: Main Control
views:
  - title: Home
    path: home
    type: sections
    max_columns: 3
    sections:
      # WEATHER SECTION
      - type: grid
        cards:
          - type: custom:button-card
            name: WEATHER
            styles:
              card:
                - background: none
                - box-shadow: none
                - padding: 4px 0 4px 8px
              name:
                - font-size: 13px
                - font-weight: 500
                - letter-spacing: 2px
                - text-transform: uppercase
                - text-align: left
                - color: rgba(255, 255, 255, 0.4)
            show_icon: false
            tap_action:
              action: none

          - type: custom:button-card
            entity: sensor.weather_temperature
            name: Now
            show_state: true
            show_label: true
            label: |
              [[[
                const condition = states['sensor.weather_condition']?.state || 'Unknown';
                const feels = states['sensor.weather_feels_like']?.state || '--';
                const wind = states['sensor.weather_wind_speed']?.state || '--';
                return `${condition} · Feels ${feels}° · Wind ${wind} mph`;
              ]]]
            styles:
              card:
                - background: rgba(30, 60, 120, 0.3)
                - backdrop-filter: blur(12px)
                - -webkit-backdrop-filter: blur(12px)
                - height: 120px
                - border-radius: 16px
                - border: 1px solid rgba(255, 255, 255, 0.08)
                - box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 4px 24px rgba(0,0,0,0.4)
              state:
                - font-size: 56px
                - font-weight: 300
                - color: rgba(255, 255, 255, 0.95)
                - letter-spacing: -2px
              name:
                - color: rgba(255, 255, 255, 0.5)
                - font-size: 12px
                - font-weight: 400
                - text-transform: uppercase
                - letter-spacing: 1px
              label:
                - color: rgba(255, 255, 255, 0.6)
                - font-size: 13px
                - font-weight: 400
              icon:
                - display: none
            tap_action:
              action: none

          - type: custom:button-card
            entity: sensor.forecast_today_high
            show_state: false
            show_label: true
            show_name: true
            name: |
              [[[
                const date = states['sensor.forecast_today_date']?.state || 'Today';
                const parts = date.split('/');
                return parts[0] + '/' + parts[1];
              ]]]
            label: |
              [[[
                const high = entity.state || '--';
                const low = states['sensor.forecast_today_low']?.state || '--';
                const condition = states['sensor.forecast_today_condition']?.state || '';
                return `${high}° / ${low}° · ${condition}`;
              ]]]
            styles:
              card:
                - background: rgba(15, 15, 25, 0.7)
                - backdrop-filter: blur(12px)
                - -webkit-backdrop-filter: blur(12px)
                - height: 70px
                - border-radius: 0
                - border: none
                - border-bottom: 1px solid rgba(255, 255, 255, 0.06)
                - box-shadow: none
              grid:
                - grid-template-areas: '"n l"'
                - grid-template-columns: 60px 1fr
              name:
                - color: rgba(255, 255, 255, 0.9)
                - font-size: 14px
                - font-weight: 600
                - justify-self: start
                - padding-left: 16px
              label:
                - color: rgba(255, 255, 255, 0.5)
                - font-size: 13px
                - font-weight: 400
                - justify-self: start
              icon:
                - display: none
            tap_action:
              action: none

