  # MUSIC VIEW
  - type: sections
    max_columns: 4
    title: Music
    path: music
    sections:
      - type: grid
        cards:
          # Now Playing Card - Large artwork with track info
          - type: custom:button-card
            entity: media_player.living_room_speaker
            show_entity_picture: true
            show_name: false
            show_state: false
            show_label: true
            label: |
              [[[
                if (entity.state === 'playing' || entity.state === 'paused') {
                  const title = entity.attributes.media_title || 'Nothing playing';
                  const artist = entity.attributes.media_artist || '';
                  return `<div style="text-align:left;padding:16px;">
                    <div style="font-size:24px;font-weight:500;color:rgba(255,255,255,0.95);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${title}</div>
                    <div style="font-size:15px;color:rgba(255,255,255,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${artist}</div>
                  </div>`;
                }
                return '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:16px;">No music playing</div>';
              ]]]
            styles:
              card:
                - height: 280px
                - background: rgba(15, 15, 25, 0.8)
                - backdrop-filter: blur(20px)
                - -webkit-backdrop-filter: blur(20px)
                - border: 1px solid rgba(255, 255, 255, 0.08)
                - border-radius: 20px
                - box-shadow: 0 8px 32px rgba(0,0,0,0.4)
                - overflow: hidden
              entity_picture:
                - position: absolute
                - top: 0
                - left: 0
                - width: 100%
                - height: 100%
                - object-fit: cover
                - opacity: 0.4
                - filter: blur(30px) saturate(1.5)
              label:
                - position: absolute
                - bottom: 0
                - left: 0
                - right: 0
                - background: linear-gradient(transparent, rgba(0,0,0,0.8))
                - padding-top: 60px
            tap_action:
              action: none

          # Playback Controls Row
          - type: grid
            columns: 5
            square: false
            cards:
              - type: custom:button-card
                icon: mdi:shuffle
                entity: media_player.living_room_speaker
                show_name: false
                tap_action:
                  action: call-service
                  service: media_player.shuffle_set
                  service_data:
                    entity_id: media_player.living_room_speaker
                    shuffle: true
                styles:
                  card:
                    - height: 60px
                    - background: rgba(15, 15, 25, 0.7)
                    - border: 1px solid rgba(255, 255, 255, 0.08)
                    - border-radius: 14px
                  icon:
                    - color: rgba(255, 255, 255, 0.4)
                    - width: 22px

              - type: custom:button-card
                icon: mdi:skip-previous
                show_name: false
                tap_action:
                  action: call-service
                  service: media_player.media_previous_track
                  service_data:
                    entity_id: media_player.living_room_speaker
                styles:
                  card:
                    - height: 60px
                    - background: rgba(15, 15, 25, 0.7)
                    - border: 1px solid rgba(255, 255, 255, 0.08)
                    - border-radius: 14px
                  icon:
                    - color: rgba(255, 255, 255, 0.7)
                    - width: 26px

              - type: custom:button-card
                entity: media_player.living_room_speaker
                show_name: false
                show_icon: true
                icon: |
                  [[[
                    return entity.state === 'playing' ? 'mdi:pause' : 'mdi:play';
                  ]]]
                tap_action:
                  action: call-service
                  service: media_player.media_play_pause
                  service_data:
                    entity_id: media_player.living_room_speaker
                styles:
                  card:
                    - height: 60px
                    - background: rgba(255, 255, 255, 0.15)
                    - border: 1px solid rgba(255, 255, 255, 0.2)
                    - border-radius: 14px
                  icon:
                    - color: rgba(255, 255, 255, 0.95)
                    - width: 30px

              - type: custom:button-card
                icon: mdi:skip-next
                show_name: false
                tap_action:
                  action: call-service
                  service: media_player.media_next_track
                  service_data:
                    entity_id: media_player.living_room_speaker
                styles:
                  card:
                    - height: 60px
                    - background: rgba(15, 15, 25, 0.7)
                    - border: 1px solid rgba(255, 255, 255, 0.08)
                    - border-radius: 14px
                  icon:
                    - color: rgba(255, 255, 255, 0.7)
                    - width: 26px

              - type: custom:button-card
                icon: mdi:repeat
                entity: media_player.living_room_speaker
                show_name: false
                tap_action:
                  action: call-service
                  service: media_player.repeat_set
                  service_data:
                    entity_id: media_player.living_room_speaker
                    repeat: all
                styles:
                  card:
                    - height: 60px
                    - background: rgba(15, 15, 25, 0.7)
                    - border: 1px solid rgba(255, 255, 255, 0.08)
                    - border-radius: 14px
                  icon:
                    - color: rgba(255, 255, 255, 0.4)
                    - width: 22px

          # Volume Control
          - type: custom:button-card
            entity: media_player.living_room_speaker
            name: Volume
            show_state: false
            show_label: true
            show_icon: true
            icon: mdi:volume-high
            label: |
              [[[
                const vol = Math.round((entity.attributes.volume_level || 0) * 100);
                return vol + '%';
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - height: 60px
                - background: rgba(15, 15, 25, 0.7)
                - border: 1px solid rgba(255, 255, 255, 0.08)
                - border-radius: 14px
              grid:
                - grid-template-areas: '"i n l"'
                - grid-template-columns: 50px 1fr 60px
              icon:
                - color: rgba(255, 255, 255, 0.5)
                - width: 24px
              name:
                - color: rgba(255, 255, 255, 0.6)
                - font-size: 14px
                - justify-self: start
              label:
                - color: rgba(255, 255, 255, 0.9)
                - font-size: 16px
                - font-weight: 500
                - justify-self: end
                - padding-right: 16px
        column_span: 3

