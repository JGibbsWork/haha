# Occupancy-Based Routine Automations
# Comfort and routine automations triggered by bed/couch occupancy

# =============================================================================
# AUTOMATION 1: Wind Down (Bed + After 9:30pm)
# =============================================================================
# Triggers when getting into bed after 9:30pm
# Dims lights, stops music, closes all blinds/shades

- id: wind_down_bed_evening
  alias: "Wind Down: Bed Occupied After 9:30pm"
  description: Dim lights, close blinds, stop music when getting into bed at night (once per night)
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.bed_occupied
      to: 'on'
  conditions:
    - condition: state
      entity_id: person.james
      state: home
    - condition: time
      after: "21:30:00"
      before: "06:00:00"
    # Only run once per night
    - condition: state
      entity_id: input_boolean.wind_down_complete
      state: 'off'
  actions:
    # Dim bedroom lights to 20% warm
    - action: light.turn_on
      target:
        entity_id:
          - light.bed_lamp
          - light.dresser
          - light.bedroom_ceiling
      data:
        brightness_pct: 20
        color_temp_kelvin: 2200
        transition: 3
    # Dim living room lights to 20% warm
    - action: light.turn_on
      target:
        entity_id:
          - light.tv_left
          - light.tv_right
      data:
        brightness_pct: 20
        color_temp_kelvin: 2200
        transition: 3
    # Turn off kitchen lights
    - action: light.turn_off
      target:
        entity_id:
          - light.kitchen_track_1
          - light.track_2
      data:
        transition: 2
    # Stop music on speakers
    - action: media_player.media_stop
      target:
        entity_id:
          - media_player.bedroom_speaker
          - media_player.living_room_speaker
      continue_on_error: true
    # Turn off projector (script checks if already off)
    - action: script.projector_turn_off
      data: {}
    # Close all blinds and shades
    - action: scene.turn_on
      target:
        entity_id: scene.blinds_closed
    - delay:
        seconds: 15
    - action: scene.turn_on
      target:
        entity_id: scene.shades_down
    # Mark wind down as complete for tonight
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.wind_down_complete

# =============================================================================
# AUTOMATION 2: Bedtime Nudge (Couch + After 10pm)
# =============================================================================
# Gentle reminder when still on couch after 10pm (once per night)

- id: bedtime_nudge_couch_late
  alias: "Bedtime Nudge: Couch After 10pm"
  description: Send notification when on couch after 10pm (once per night)
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.couch_occupied
      to: 'on'
  conditions:
    - condition: state
      entity_id: person.james
      state: home
    - condition: time
      after: "22:00:00"
      before: "02:00:00"
    # Only trigger once per night
    - condition: state
      entity_id: input_boolean.bedtime_nudge_done
      state: 'off'
  actions:
    # Mark as done for tonight
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.bedtime_nudge_done
    # Send notification
    - action: notify.mobile_app_jamess_iphone
      data:
        title: "Time Check"
        message: "Getting late — time to wind down?"
        data:
          push:
            sound: default

# =============================================================================
# AUTOMATION 3: Good Morning Briefing (Bed Unoccupied + Morning)
# =============================================================================
# Trigger morning briefing when getting out of bed (once per day)

- id: morning_briefing_bed_exit
  alias: "Morning Briefing: Bed Exit Trigger"
  description: Trigger morning briefing when getting out of bed in the morning
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.bed_occupied
      to: 'off'
  conditions:
    - condition: state
      entity_id: person.james
      state: home
    - condition: time
      after: "06:00:00"
      before: "11:00:00"
    # Only trigger once per day (reuse existing helper)
    - condition: state
      entity_id: input_boolean.briefing_printed_today
      state: 'off'
  actions:
    # Mark as done for today
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.briefing_printed_today
    # Small delay to let you get settled
    - delay:
        seconds: 30
    # Trigger morning briefing script
    - action: script.good_morning_briefing
      data:
        speak: true

# =============================================================================
# MIDNIGHT RESET: All daily/nightly helpers
# =============================================================================
- id: occupancy_routines_reset_midnight
  alias: "Occupancy Routines: Reset at Midnight"
  description: Reset all once-per-day/night helpers at midnight
  mode: single
  triggers:
    - platform: time
      at: "00:00:00"
  conditions: []
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.bedtime_nudge_done
          - input_boolean.briefing_printed_today
          - input_boolean.wind_down_complete

