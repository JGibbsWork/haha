# Blinds and Shades Control Scripts
# These scripts wrap the scene-based controls for backwards compatibility

open_blinds:
  alias: Open Blinds
  description: Opens all blinds using the Blinds Open scene
  mode: single
  sequence:
    - action: scene.turn_on
      target:
        entity_id: scene.blinds_open

close_blinds:
  alias: Close Blinds
  description: Closes all blinds - sends direct close command to bedBlind and diningBlind
  mode: single
  sequence:
    # Send direct close command to problematic blinds
    - action: cover.close_cover
      target:
        entity_id:
          - cover.bedblind_cover
          - cover.diningblind_cover
    # Use scene for the rest
    - action: scene.turn_on
      target:
        entity_id: scene.blinds_closed

open_shades:
  alias: Open Shades
  description: Opens all shades using the Shades Up scene
  mode: single
  sequence:
    - action: scene.turn_on
      target:
        entity_id: scene.shades_up

close_shades:
  alias: Close Shades
  description: Closes all shades using the Shades Down scene
  mode: single
  sequence:
    - action: scene.turn_on
      target:
        entity_id: scene.shades_down
