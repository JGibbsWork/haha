# Lifestack Display Profile Management
# REST commands to control TV and Projector display profiles via Lifestack API
# API runs at sentinel.local:3002

rest_command:
  lifestack_profile_default:
    url: "http://sentinel.local:3002/api/profile"
    method: POST
    headers:
      Content-Type: application/json
    payload: '{"profile": "default"}'

  lifestack_profile_relax:
    url: "http://sentinel.local:3002/api/profile"
    method: POST
    headers:
      Content-Type: application/json
    payload: '{"profile": "relax"}'

