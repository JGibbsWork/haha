# Chicago Transit Tracker
rest:
  - resource: http://sentinel.local:3002/api/transit/all
    scan_interval: 60  # Update every 60 seconds
    sensor:
      # Bus 77 Eastbound - Next arrival
      - name: "Bus 77 East Next"
        value_template: "{{ value_json.data.buses.east[0].minutesAway }}"
        availability: "{{ value_json.success and value_json.data.buses.east | length > 0 }}"
        unit_of_measurement: "min"
        icon: mdi:bus
        json_attributes_path: "$.data.buses.east[0]"
        json_attributes:
          - route
          - destination
          - predictedTime
          - vehicleId

      # Bus 77 Westbound - Next arrival
      - name: "Bus 77 West Next"
        value_template: "{{ value_json.data.buses.west[0].minutesAway }}"
        availability: "{{ value_json.success and value_json.data.buses.west | length > 0 }}"
        unit_of_measurement: "min"
        icon: mdi:bus
        json_attributes_path: "$.data.buses.west[0]"
        json_attributes:
          - route
          - destination
          - predictedTime
          - vehicleId

      # Bus 77 Eastbound - Second arrival
      - name: "Bus 77 East Second"
        value_template: "{{ value_json.data.buses.east[1].minutesAway }}"
        availability: "{{ value_json.success and value_json.data.buses.east | length > 1 }}"
        unit_of_measurement: "min"
        icon: mdi:bus
        json_attributes_path: "$.data.buses.east[1]"
        json_attributes:
          - route
          - destination
          - predictedTime
          - vehicleId

      # Bus 77 Westbound - Second arrival
      - name: "Bus 77 West Second"
        value_template: "{{ value_json.data.buses.west[1].minutesAway }}"
        availability: "{{ value_json.success and value_json.data.buses.west | length > 1 }}"
        unit_of_measurement: "min"
        icon: mdi:bus
        json_attributes_path: "$.data.buses.west[1]"
        json_attributes:
          - route
          - destination
          - predictedTime
          - vehicleId

      # Red Line Northbound - Next arrival
      - name: "Red Line North Next"
        value_template: >
          {{ (value_json.data.red.north | selectattr('direction', 'equalto', 'Northbound') | list)[0].minutesAway }}
        availability: >
          {{ value_json.success and (value_json.data.red.north | selectattr('direction', 'equalto', 'Northbound') | list) | length > 0 }}
        unit_of_measurement: "min"
        icon: mdi:subway-variant
        json_attributes_path: "$.data.red.north[0]"
        json_attributes:
          - "0"

      # Red Line Southbound - Next arrival
      - name: "Red Line South Next"
        value_template: >
          {{ (value_json.data.red.south | selectattr('direction', 'equalto', 'Southbound') | list)[0].minutesAway }}
        availability: >
          {{ value_json.success and (value_json.data.red.south | selectattr('direction', 'equalto', 'Southbound') | list) | length > 0 }}
        unit_of_measurement: "min"
        icon: mdi:subway-variant
        json_attributes_path: "$.data.red.south[0]"
        json_attributes:
          - "0"

      # Brown Line Northbound - Next arrival
      - name: "Brown Line North Next"
        value_template: >
          {{ (value_json.data.brown.north | selectattr('direction', 'equalto', 'Northbound') | list)[0].minutesAway }}
        availability: >
          {{ value_json.success and (value_json.data.brown.north | selectattr('direction', 'equalto', 'Northbound') | list) | length > 0 }}
        unit_of_measurement: "min"
        icon: mdi:subway-variant
        json_attributes_path: "$.data.brown.north[0]"
        json_attributes:
          - "0"

      # Brown Line Southbound - Next arrival
      - name: "Brown Line South Next"
        value_template: >
          {{ (value_json.data.brown.south | selectattr('direction', 'equalto', 'Southbound') | list)[0].minutesAway }}
        availability: >
          {{ value_json.success and (value_json.data.brown.south | selectattr('direction', 'equalto', 'Southbound') | list) | length > 0 }}
        unit_of_measurement: "min"
        icon: mdi:subway-variant
        json_attributes_path: "$.data.brown.south[0]"
        json_attributes:
          - "0"
